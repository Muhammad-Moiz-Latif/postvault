version: "3.8"

services:
  web:
    build: .
    image: my-next-app:latest   # local image name; you can change before pushing
    ports:
      - "80:3000"               # host port 80 → container 3000 (change if you want)
    env_file:
      - .env                    # loads environment variables from .env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespw
      POSTGRES_DB: mydb
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db_data:
